<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Juniper Loop Web Experience</title>
    <link rel="stylesheet" href="../css/juniper-loop-tokens.css">
    <style>
      body { background: var(--jl-cloud); }
      .nav { max-width: var(--jl-max-width); margin: 0 auto; padding: 22px 24px; display: flex; align-items: center; justify-content: space-between; gap: 20px; }
      .nav img { width: 230px; max-width: 58vw; height: auto; }
      .nav-links { display: flex; gap: 18px; color: var(--jl-plum); font: 700 13px/1 var(--jl-font-sans); }
      .hero { display: grid; grid-template-columns: minmax(0, 0.92fr) minmax(320px, 1.08fr); min-height: 620px; border-top: 1px solid var(--jl-stone); border-bottom: 1px solid var(--jl-stone); }
      .copy { align-self: center; padding: 56px max(24px, calc((100vw - var(--jl-max-width)) / 2)) 56px 24px; max-width: 580px; justify-self: end; }
      .visual { position: relative; min-height: 420px; overflow: hidden; background: var(--jl-oat); }
      .visual img { width: 100%; height: 100%; object-fit: cover; display: block; }
      .pill { display: inline-flex; margin-bottom: 18px; padding: 8px 11px; border: 1px solid var(--jl-stone); border-radius: 999px; color: var(--jl-plum); font: 800 12px/1 var(--jl-font-sans); letter-spacing: 0.08em; text-transform: uppercase; }
      h1 { margin: 0 0 18px; color: var(--jl-juniper); font: 600 60px/0.96 var(--jl-font-serif); letter-spacing: 0; }
      p { max-width: 500px; margin: 0 0 26px; color: rgba(32, 35, 31, 0.78); font: 400 18px/1.55 var(--jl-font-sans); }
      .actions { display: flex; flex-wrap: wrap; gap: 12px; }
      @media (max-width: 820px) {
        .nav-links { display: none; }
        .hero { grid-template-columns: 1fr; }
        .copy { justify-self: start; padding: 38px 24px 42px; }
        h1 { font-size: 42px; }
        .visual { min-height: 360px; order: -1; }
      }
    </style>
  </head>
  <body>
    <header class="nav">
      <img src="../logo/juniper-loop-lockup.svg" alt="Juniper Loop">
      <nav class="nav-links" aria-label="Sample navigation">
        <span>Routines</span>
        <span>Content</span>
        <span>Community</span>
        <span>Shop</span>
      </nav>
    </header>
    <main class="hero">
      <section class="copy">
        <div class="pill">Everyday habits</div>
        <h1 class="jl-display">Small routines, made easier.</h1>
        <p>A calm web-experience starter for teams building lifecycle concepts, membership journeys, internal tools, or campaign previews.</p>
        <div class="actions">
          <a class="jl-button" href="#">Find a routine</a>
          <a class="jl-button secondary" href="#">Explore ideas</a>
        </div>
      </section>
      <section class="visual" aria-label="Routine kit and everyday wellness objects">
        <img src="../images/commerce-routine-kit.png" alt="">
      </section>
    </main>
  </body>
</html>
